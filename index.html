<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Cursor Interaction</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Dark background as seen in video */
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseMoved = false;

        const pointer = {
            x: 0.5 * window.innerWidth,
            y: 0.5 * window.innerHeight,
        };

        const params = {
            pointsNumber: 40,
            widthFactor: 0.3,
            mouseThreshold: 0.6,
            spring: 0.4,
            friction: 0.5,
        };

        const trail = new Array(params.pointsNumber).fill(null).map(() => ({
            x: pointer.x,
            y: pointer.y,
            dx: 0,
            dy: 0,
        }));

        window.addEventListener("mousemove", e => {
            mouseMoved = true;
            pointer.x = e.clientX;
            pointer.y = e.clientY;
        });

        window.addEventListener("touchmove", e => {
            mouseMoved = true;
            pointer.x = e.targetTouches[0].clientX;
            pointer.y = e.targetTouches[0].clientY;
        });

        function setupCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function update(t) {
            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            trail.forEach((p, pIdx) => {
                const prev = pIdx === 0 ? pointer : trail[pIdx - 1];
                const spring = pIdx === 0 ? 0.4 * params.spring : params.spring;

                p.dx += (prev.x - p.x) * spring;
                p.dy += (prev.y - p.y) * spring;
                p.dx *= params.friction;
                p.dy *= params.friction;
                p.x += p.dx;
                p.y += p.dy;
            });

            // Draw the multi-colored line
            ctx.lineCap = "round";
            ctx.lineWidth = 2;

            for (let i = 0; i < trail.length - 1; i++) {
                const xc = (trail[i].x + trail[i + 1].x) / 2;
                const yc = (trail[i].y + trail[i + 1].y) / 2;

                // Cycle colors based on index/time
                ctx.strokeStyle = `hsl(${Math.floor(i / trail.length * 360 + t / 10)}, 100%, 60%)`;
                
                ctx.beginPath();
                ctx.moveTo(trail[i].x, trail[i].y);
                ctx.quadraticCurveTo(trail[i].x, trail[i].y, xc, yc);
                ctx.stroke();
            }

            requestAnimationFrame(update);
        }

        setupCanvas();
        update(0);
        window.addEventListener('resize', setupCanvas);
    </script>
</body>
</html>
